services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoattendance
      POSTGRES_USER: autoattendance
      POSTGRES_PASSWORD: autoattendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./backend
    env_file: ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  postgres_data:
